milestones:
  - title: v0.1
    description: Zero to one safe DN42 peer, split DNS, and first service access.

issues:
  - title: "Scaffold MkDocs Material with uv"
    labels: ["tooling", "github-pages", "v0.1"]
    milestone: "v0.1"
    body: |
      Create the initial MkDocs Material site using uv-managed Python dependencies.

      Acceptance criteria:
      - `pyproject.toml` declares MkDocs Material and project tooling.
      - `uv.lock` is committed.
      - `mkdocs.yml` builds the initial navigation.
      - `uv run mkdocs build --strict` succeeds.

  - title: "Add GitHub Pages deployment workflow"
    labels: ["tooling", "github-pages", "v0.1"]
    milestone: "v0.1"
    body: |
      Add a GitHub Actions workflow that builds MkDocs and deploys the site to GitHub Pages from main.

      Acceptance criteria:
      - Pull requests run a strict docs build without deploying.
      - Pushes to main deploy through GitHub Pages.
      - Generated `site/` output remains uncommitted.

  - title: "Add source registry validation"
    labels: ["tooling", "research", "v0.1"]
    milestone: "v0.1"
    body: |
      Add a script that validates `research/sources.yml` for required fields, duplicate IDs, valid URLs, and accepted status/cache_policy values.

      Acceptance criteria:
      - Validation runs locally.
      - Validation runs in CI.
      - Failure messages identify the broken source ID.

  - title: "Fetch local reference cache from research/sources.yml"
    labels: ["tooling", "reference-cache", "research", "v0.1"]
    milestone: "v0.1"
    body: |
      Use `scripts/fetch_references.py` to populate ignored cache files under `research/cache/`.

      Acceptance criteria:
      - Each fetched source records URL, retrieval time, status code, and SHA-256.
      - Raw cache files are ignored by Git.
      - Failures are explicit and do not corrupt existing cache files.

