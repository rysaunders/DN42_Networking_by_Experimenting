  - title: "Build local namespace routing lab"
    labels: ["experiment", "conceptual", "needs-lab-test", "good-first-lab", "v0.1"]
    milestone: "v0.1"
    body: |
      Build the first-principles Linux routing lab using network namespaces.

      Acceptance criteria:
      - Lab creates isolated namespaces and routes between them.
      - Lab demonstrates route lookup and forwarding.
      - Rollback removes namespaces and temporary state.
      - Transcript is saved under `experiments/transcripts/`.

  - title: "Build Pocket Internet static routing topology"
    labels: ["experiment", "conceptual", "needs-lab-test", "v0.1"]
    milestone: "v0.1"
    body: |
      Build the first reusable Pocket Internet topology: four AS-shaped namespaces connected with veth links, loopback service addresses, and static routes.

      Acceptance criteria:
      - Lab creates at least four namespaces named as local ASes.
      - Lab uses veth pairs as point-to-point links between AS namespaces.
      - Lab assigns loopback service addresses that represent advertised prefixes.
      - Static routes make loopback service addresses reachable end to end.
      - Lab demonstrates a link failure or route removal and explains the resulting loss of reachability.
      - Lab records route lookup, ping, and packet-observation evidence.
      - Rollback removes namespaces and temporary state.
      - Transcript is saved under `experiments/transcripts/`.
      - Beginner review is run or explicitly deferred according to `docs/authoring-templates/review-loop.md`.

  - title: "Draft addresses, prefixes, and longest match"
    labels: ["chapter", "conceptual", "needs-lab-test", "v0.1"]
    milestone: "v0.1"
    body: |
      Draft the first-principles chapter that explains addresses, prefixes, CIDR notation, route specificity, and longest-prefix match before BGP appears.

      Acceptance criteria:
      - Explains an address as one point and a prefix as a set of addresses.
      - Explains `/30`, `/32`, IPv4 examples, and the route-table meaning of prefix length.
      - Demonstrates longest-prefix match with observable `ip route get` output.
      - Includes at least one predict-before-reveal exercise.
      - Connects the concept to Pocket Internet route selection.
      - Beginner review is run or explicitly deferred according to `docs/authoring-templates/review-loop.md`.

  - title: "Build Pocket Internet route-selection lab"
    labels: ["experiment", "conceptual", "needs-lab-test", "v0.1"]
    milestone: "v0.1"
    body: |
      Build a Pocket Internet lab that reinforces route selection and longest-prefix match inside a local router context.

      Acceptance criteria:
      - Lab is manual-first in the docs, with scripts used only for repeat validation.
      - Lab uses Pocket Internet naming and a route-table view inside a local router/edge namespace.
      - Lab shows a broad route and a more-specific route matching the same destination.
      - Lab uses route lookup to prove that the more-specific route wins.
      - Lab removes the more-specific route and shows fallback to the broader route.
      - Lab explains why next hops must be on a connected route.
      - Validation script and transcript live under `experiments/`.
      - Beginner review is run or explicitly deferred according to `docs/authoring-templates/review-loop.md`.

  - title: "Rewrite Pocket Internet static routing as a manual-first lab"
    labels: ["chapter", "experiment", "conceptual", "needs-lab-test", "v0.1"]
    milestone: "v0.1"
    body: |
      Rewrite the Pocket Internet static routing chapter so the reader builds the topology manually instead of primarily reading a script procedure map.

      Why:
      This is the keystone Pocket Internet chapter. It should burn namespaces, veth links, loopbacks, static routes, return paths, link failure, and manual repair into memory before BGP automates the same behavior.

      Acceptance criteria:
      - Chapter remains validated by a script and transcript, but the primary teaching path is manual command entry.
      - Procedure map is either removed or moved after the manual path as a summary.
      - Reader creates namespaces, veth links, loopback service addresses, link addresses, forwarding, static routes, breakage, and repair by hand.
      - Each major state change has an inspection command and expected observation.
      - Forward path and return path are explained with route-table evidence.
      - Rollback is explicit and tested.
      - Beginner review is run and triaged before closing.

  - title: "Rename early labs to Pocket Internet language"
    labels: ["chapter", "conceptual", "v0.1"]
    milestone: "v0.1"
    body: |
      Make early labs use Pocket Internet naming consistently before real DN42 appears.

      Why:
      The first Linux routing lab still uses dn42lab-* namespace names. That was reasonable originally, but the book has shifted: Pocket Internet is the lab and DN42 is the later bridge. Early DN42 naming now risks implying that the local namespaces are already DN42.

      Acceptance criteria:
      - Rename early lab namespaces, scripts, transcripts, and prose from dn42lab-* to Pocket Internet-oriented names where appropriate.
      - Keep historical transcript references only if intentionally retained and clearly marked.
      - Update scripts and regenerate transcripts after renaming.
      - Update reader knowledge and nav text if affected.
      - Verify no stale dn42lab naming remains in instructional prose before real DN42 chapters.
      - Run normal validation and beginner review if explanatory content changes.

  - title: "Add chapter transitions and reader checkpoints"
    labels: ["chapter", "conceptual", "v0.1"]
    milestone: "v0.1"
    body: |
      Add connective tissue between the early chapters so the book reads like a guided progression instead of a set of good standalone labs.

      Why:
      The individual chapters are improving, but a beginner needs explicit orientation: what they now know, what remains unresolved, and why the next chapter exists.

      Acceptance criteria:
      - Add short end-of-chapter checkpoints to early chapters.
      - Each checkpoint distinguishes: now you can explain, still fuzzy is okay, and next we need to learn.
      - Add opening transition language to Chapters 2, 3, and 4 tying each chapter to the previous one.
      - Avoid introducing new technical concepts in checkpoint prose.
      - Update docs/reader-knowledge.md if any recurring checkpoint vocabulary becomes part of the teaching pattern.
      - Beginner review checks whether the progression feels coherent for a first-time networking learner.

  - title: "Add a visual glossary for Linux networking objects"
    labels: ["chapter", "conceptual", "v0.1"]
    milestone: "v0.1"
    body: |
      Create an early visual glossary that explains the recurring Linux networking objects used throughout Pocket Internet.

      Why:
      A beginner sees namespace, interface, veth, address, prefix, connected route, next hop, loopback, route table, and forwarding very quickly. The chapters define these terms locally, but the book needs one reusable mental map.

      Acceptance criteria:
      - Add a concise visual glossary or concept-map page near Start Here or Part 1.
      - Cover namespace, network stack, interface, veth pair, address, prefix, connected route, route table, next hop, loopback, forwarding, and service loopback.
      - Use diagrams or simple ASCII/mermaid visuals, not only prose.
      - Link early chapters to this page where it helps without interrupting the lab flow.
      - Keep definitions consistent with docs/reader-knowledge.md and includes/abbreviations.md.
      - Beginner review checks whether the glossary lowers cognitive load rather than becoming another wall of terms.

  - title: "Clarify the roles of the two route-selection chapters"
    labels: ["chapter", "conceptual", "v0.1"]
    milestone: "v0.1"
    body: |
      Clarify why the book has both Addresses, Prefixes, and Longest Match and Pocket Internet Route Selection.

      Why:
      Chapter 2 teaches longest-prefix match in isolation. Chapter 4 applies a similar idea inside the Pocket Internet edge-router model. Both are useful, but the distinction must be explicit or the sequence may feel repetitive.

      Acceptance criteria:
      - Chapter 2 clearly frames itself as an isolated primitive: route lookup and specificity without packet delivery.
      - Chapter 4 clearly frames itself as applying that primitive inside a Pocket Internet router role.
      - Remove or revise duplicated explanation where it does not add new value.
      - Add transition text from Chapter 2 to Chapter 4 and from Chapter 4 toward BGP.
      - Keep both labs if they serve distinct learning jobs; merge or shorten if review shows they feel redundant.
      - Beginner review specifically evaluates whether the two chapters feel complementary rather than repetitive.

  - title: "Add human narration around intentional lab friction"
    labels: ["chapter", "conceptual", "v0.1"]
    milestone: "v0.1"
    body: |
      Add a restrained human voice where the labs are intentionally tedious, starting with Pocket Internet static routing.

      Why:
      Some friction is the curriculum. Static routing should feel annoying before BGP appears: the reader has to write forward paths, return paths, and repairs by hand. That feeling sets up why dynamic routing exists. The book should name that without becoming jokey or distracting.

      Acceptance criteria:
      - Add one or two short human notes to the static routing chapter where the tedium is educational.
      - Explicitly connect manual route maintenance to why BGP will feel useful later.
      - Keep the tone plainspoken and direct; avoid cute, performative, or clearly AI-sounding phrasing.
      - Update authoring guidance so future intentionally tedious labs name the pain and explain the concept or tool that will relieve it.
      - Apply this guidance sparingly: no more than a couple of asides per chapter unless the chapter genuinely needs more.
      - Beginner review checks whether the voice improves motivation without distracting from the commands.

  - title: "Add state snapshot diagrams to Pocket Internet static routing"
    labels: ["chapter", "conceptual", "v0.1"]
    milestone: "v0.1"
    body: |
      Add lightweight state-snapshot diagrams to the Pocket Internet static routing chapter to reduce topology working-memory load.

      Why:
      The manual-first static routing lab is intentionally command-heavy. The reader has to track four namespaces, four links, service loopbacks, connected /30s, selected forward and return routes, a broken clockwise path, and a repaired alternate path. One opening topology diagram is not enough.

      Acceptance criteria:
      - Add diagrams at key state changes in `docs/part-01-first-principles/03-pocket-internet-static-routing.md`.
      - Diagrams show only the state relevant at that moment.
      - Distinguish physical links from selected routes.
      - Include forward and return paths where both matter.
      - Suggested snapshots: after veth links, after service loopbacks, before static routes, after clockwise static routes, after breaking AS2-AS3, and after repairing via AS4.
      - Keep diagrams lightweight; avoid visual noise or repeating the same diagram without new information.
      - Beginner review checks whether the diagrams reduce mental load for a first-time networking learner.

  - title: "Replace one Pocket Internet link with WireGuard"
    labels: ["experiment", "needs-lab-test", "v0.1"]
    milestone: "v0.1"
    body: |
      Replace one veth link in the Pocket Internet topology with WireGuard before using public DN42 peers.

      Acceptance criteria:
      - Lab starts from the Pocket Internet topology instead of a standalone two-node demo.
      - Lab shows key generation, interface setup, handshake, and packet flow.
      - Lab explains underlay vs overlay.
      - Existing routing behavior still works after the link is replaced.
      - Rollback removes interfaces, namespaces, and generated keys.
      - Beginner review is run or explicitly deferred according to `docs/authoring-templates/review-loop.md`.

  - title: "Add BIRD and BGP to Pocket Internet"
    labels: ["experiment", "needs-lab-test", "v0.1"]
    milestone: "v0.1"
    body: |
      Add BIRD and BGP to the Pocket Internet topology so reachability is learned instead of statically configured.

      Acceptance criteria:
      - Lab starts from the Pocket Internet topology.
      - Lab establishes BGP sessions between local AS namespaces.
      - Lab advertises loopback service prefixes.
      - Lab demonstrates kernel route export.
      - Lab demonstrates route withdrawal or link failure and observes convergence.
      - Lab includes troubleshooting branches for session and route-install failures.
      - Beginner review is run or explicitly deferred according to `docs/authoring-templates/review-loop.md`.

  - title: "Design the Pocket Internet to DN42 border"
    labels: ["chapter", "conceptual", "safety", "dn42-current", "v0.1"]
    milestone: "v0.1"
    body: |
      Design the conceptual border between Pocket Internet and DN42 before implementing real peering chapters.

      This is not a default "publish the lab into DN42" chapter. Pocket Internet remains the local laboratory. DN42 is the living routing ecosystem the reader approaches after the lab concepts are clear.

      Acceptance criteria:
      - Explains Pocket Internet as the lab and DN42 as the living network beyond the lab.
      - Uses a dedicated border namespace/router in the design.
      - Starts with containment: no default route into DN42 and no Pocket Internet route export.
      - Explains outbound reachability as a design question, not a guaranteed first implementation.
      - Treats return path as a first-class requirement.
      - Explains that route advertisement toward DN42 requires authorized DN42 resources and explicit peer expectations.
      - Makes live Pocket Internet-to-DN42 route export optional, advanced, and out of the default path.
      - Includes rollback and "what could leak?" checks.
      - Beginner review is run or explicitly deferred according to `docs/authoring-templates/review-loop.md`.

  - title: "Draft safety page"
    labels: ["chapter", "safety", "v0.1"]
    milestone: "v0.1"
    body: |
      Draft the recurring safety page for route leaks, public egress, forwarding, firewalls, and rollback.

      Acceptance criteria:
      - Safety checklist is reusable by each lab.
      - Rollback pattern is explicit.
      - Default-route and export-policy warnings are prominent.

  - title: "Draft registry objects chapter"
    labels: ["chapter", "research", "dn42-current", "v0.1"]
    milestone: "v0.1"
    body: |
      Draft the chapter that explains DN42 maintainer, person, ASN, prefix, route, and optional DNS objects.

      Acceptance criteria:
      - Current-practice claims cite research notes.
      - No untested command is presented as verified.
      - Privacy and authentication warnings are included.

  - title: "Draft first WireGuard peer chapter"
    labels: ["chapter", "dn42-current", "v0.1"]
    milestone: "v0.1"
    body: |
      Draft the first public DN42 WireGuard peer chapter.

      Acceptance criteria:
      - Separates conceptual WireGuard behavior from DN42 peer conventions.
      - Includes verification and rollback.
      - Warns against accidental default-route behavior.

  - title: "Draft first BIRD session chapter"
    labels: ["chapter", "dn42-current", "v0.1"]
    milestone: "v0.1"
    body: |
      Draft the first BIRD session chapter.

      Acceptance criteria:
      - Shows safe import/export policy.
      - Explains session states and route visibility.
      - Includes kernel-route troubleshooting.

  - title: "Draft split DNS chapter"
    labels: ["chapter", "dn42-current", "v0.1"]
    milestone: "v0.1"
    body: |
      Draft the `.dn42` split DNS chapter.

      Acceptance criteria:
      - Public DNS remains unaffected.
      - Resolver-specific behavior is marked by implementation.
      - Current DN42 resolver recommendations are source-reviewed.

  # Post-review Pocket Internet hardening created from #61.
  # These issues gate the DN42-facing draft issues above.
  - title: "Fix Pocket Internet runbook and safety command correctness"
    labels: ["chapter", "conceptual", "safety", "v0.1"]
    milestone: "v0.1"
    body: |
      Fix correctness issues found during the Pocket Internet technical review in the observability runbook and safety command examples.

      Acceptance criteria:
      - No stale `pocket-v6-left` or `bgp_as2` remains.
      - Pocket Internet BIRD examples include the correct `birdc -s /tmp/.../*.ctl` socket path.
      - Safety examples clearly distinguish system-managed host commands from namespace-local lab commands.
      - `uv run mkdocs build --strict` passes.

  - title: "Move local-link observation earlier in Part 1"
    labels: ["chapter", "conceptual", "v0.1"]
    milestone: "v0.1"
    body: |
      Move or split local-link observation so beginners see packet movement and neighbor discovery earlier in Part 1.

      Acceptance criteria:
      - A first-time reader sees route lookup versus local-link delivery before the larger BGP/WireGuard labs depend on that distinction.
      - Chapter ordering and nav reflect the new sequence.
      - Early chapters no longer leave `/30`, connected route, or on-link behavior as unexplained magic for many chapters.
      - `uv run mkdocs build --strict` passes.
      - Beginner review is run or explicitly deferred with reason.

  - title: "Standardize Part 1 lab requirements and checkpoint resume paths"
    labels: ["chapter", "experiment", "conceptual", "v0.1"]
    milestone: "v0.1"
    body: |
      Standardize Part 1 lab requirements and checkpoint/resume blocks so long labs remain manual-first without forcing repeated full rebuilds.

      Acceptance criteria:
      - Every Part 1 lab chapter has a clear preflight covering environment, root requirement, required tools, validation script, and transcript path where applicable.
      - Dependent chapters state the exact checkpoint they require and how to verify it.
      - Dependent chapters offer a repeatable resume path without undermining manual-first learning.
      - `uv run mkdocs build --strict` passes.
      - Beginner review checks whether the revised flow reduces rebuild friction.

  - title: "Harden BIRD/BGP config teaching and lab policy caveats"
    labels: ["chapter", "conceptual", "safety", "v0.1"]
    milestone: "v0.1"
    body: |
      Harden the BIRD/BGP teaching path so configs are technically caveated and easier to reason about before DN42-facing chapters.

      Acceptance criteria:
      - `06-bgp-before-dn42.md` teaches the config shape before asking the reader to write the full config.
      - Lab import/export filters are explicitly labeled as lab-only prefix allowlists.
      - The chapter does not imply that Pocket Internet BGP policy is sufficient for DN42.
      - `uv run mkdocs build --strict` passes.
      - Beginner and technical review are run or explicitly deferred with reason.

  - title: "Add BIRD/BGP and WireGuard state snapshots"
    labels: ["chapter", "conceptual", "safety", "v0.1"]
    milestone: "v0.1"
    body: |
      Add state snapshots and WireGuard failure-mode guidance to the BIRD/BGP and WireGuard chapters.

      Acceptance criteria:
      - BIRD/BGP chapters show state before BIRD, after local route learning, after BGP establishment, and after kernel export where useful.
      - WireGuard chapters show underlay, overlay, BGP-over-overlay, and service-loopback traffic state where useful.
      - `AllowedIPs` failure mode is stated clearly and technically.
      - `uv run mkdocs build --strict` passes.
      - Beginner review checks whether diagrams reduce mental load.

  - title: "Run targeted Part 1 re-review after hardening fixes"
    labels: ["chapter", "conceptual", "v0.1"]
    milestone: "v0.1"
    body: |
      Run a targeted re-review after the immediate Pocket Internet hardening fixes land.

      Acceptance criteria:
      - Add a short review note under `research/notes/`.
      - The note explicitly states whether Part 1 is ready to proceed into DN42-facing chapter drafting.
      - Any remaining blocker becomes a new issue before this closes.
      - `uv run mkdocs build --strict` passes if docs are changed.

  - title: "Refresh DN42 sources before implementation chapters"
    labels: ["research", "dn42-current", "needs-source-review", "source-refresh", "v0.1"]
    milestone: "v0.1"
    body: |
      Refresh volatile DN42 sources and annotate DN42-facing issues before drafting implementation chapters.

      Acceptance criteria:
      - Relevant `research/sources.yml` entries have current `reviewed_on` dates or explicit rationale for retaining the prior review.
      - DN42 registry, BIRD 2, WireGuard, network settings, and DNS/split-resolver guidance are covered by notes before implementation chapters proceed.
      - #12, #13, #14, #15, and #20 are annotated with the source notes they must cite.
      - `python3 scripts/validate_sources.py` passes.
      - `uv run mkdocs build --strict` passes if docs are changed.
