name: Chapter
description: Plan, draft, or revise a book chapter.
title: "Chapter: "
labels:
  - chapter
body:
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What concept, lab, and reader outcome should this chapter cover?
    validations:
      required: true
  - type: textarea
    id: reader_starting_point
    attributes:
      label: Reader Starting Point
      description: What can the reader be assumed to know, and what must be introduced from first principles?
    validations:
      required: true
  - type: textarea
    id: new_terms
    attributes:
      label: New Terms and Diagrams
      description: Which terms need definitions, and what diagrams or illustrations are needed?
    validations:
      required: true
  - type: textarea
    id: guided_learning
    attributes:
      label: Guided Learning Checks
      description: What should the reader predict, observe, and explain before moving on?
    validations:
      required: true
  - type: textarea
    id: research
    attributes:
      label: Required Sources
      description: List source IDs from research/sources.yml and mark any DN42-current claims.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: What commands, transcript, screenshots, or review evidence will prove this chapter is ready?
    validations:
      required: true
