site_name: "Building a Small Internet"
site_description: "Networking by Experimenting with DN42"
site_url: "https://rysaunders.github.io/DN42_Networking_by_Experimenting/"
repo_url: "https://github.com/rysaunders/DN42_Networking_by_Experimenting"
repo_name: "rysaunders/DN42_Networking_by_Experimenting"
edit_uri: "edit/main/docs/"
strict: true

theme:
  name: material
  features:
    - content.tooltips
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

watch:
  - includes

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Linux Networking Objects: linux-networking-objects.md
  - Pocket Internet: pocket-internet.md
  - Pocket Internet Interconnect: pocket-internet-dn42-interconnect.md
  - Part 1 - From Host to Router:
      - Overview: part-01-first-principles/index.md
      - Linux as a Router: part-01-first-principles/01-linux-networking.md
      - Addresses, Prefixes, and Longest Match: part-01-first-principles/02-addressing-and-subnets.md
      - Pocket Internet Static Routing: part-01-first-principles/03-pocket-internet-static-routing.md
      - Pocket Internet Route Selection: part-01-first-principles/04-routing-tables.md
  - Later - DN42 Node:
      - Overview: part-02-first-dn42-node/index.md
      - Registry Objects: part-02-first-dn42-node/01-registry-objects.md
      - First WireGuard Peer: part-02-first-dn42-node/02-first-wireguard-peer.md
      - First BIRD Session: part-02-first-dn42-node/03-first-bird-session.md
      - Kernel Routes: part-02-first-dn42-node/04-kernel-routes.md
      - DN42 DNS: part-02-first-dn42-node/05-dn42-dns.md
      - First Service: part-02-first-dn42-node/06-first-service.md
  - Reference:
      - Safety: safety.md
      - Glossary: glossary.md
  - Appendices:
      - Lab Environment: appendices/lab-environment.md
      - Citation Index: appendices/citation-index.md
  - Project:
      - Chapter Template: authoring-templates/chapter-template.md
      - Experiment Template: authoring-templates/experiment-template.md
      - Research Note Template: authoring-templates/research-note-template.md
      - Beginner Review Loop: authoring-templates/review-loop.md
      - Reader Knowledge Ledger: reader-knowledge.md
      - Future Lab Drafts:
          - WireGuard as a Link: part-01-first-principles/05-wireguard-as-a-link.md
          - BGP Before DN42: part-01-first-principles/06-bgp-before-dn42.md
